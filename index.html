<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>digitalGB Onboarding Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1e1e1e;
    --accent: #c8f542;
    --accent2: #42f5c8;
    --text: #f0f0f0;
    --muted: #777;
    --border: #2a2a2a;
    --done: #2a3a1a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }

  .tag {
    display: inline-block;
    background: var(--accent);
    color: #0d0d0d;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 2px;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
  }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 100px;
    height: 6px;
    margin: 32px 0 8px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    width: 0%;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-label {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  .progress-label span { color: var(--accent); font-weight: 500; }

  .phase {
    margin-bottom: 36px;
    animation: fadeUp 0.6s ease both;
  }

  .phase:nth-child(1) { animation-delay: 0.1s; }
  .phase:nth-child(2) { animation-delay: 0.2s; }
  .phase:nth-child(3) { animation-delay: 0.3s; }
  .phase:nth-child(4) { animation-delay: 0.4s; }
  .phase:nth-child(5) { animation-delay: 0.5s; }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .phase-num {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--accent);
    color: #0d0d0d;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .phase-title {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .phase-count {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
  }

  .items {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.25s ease;
    user-select: none;
  }

  .item:hover { border-color: #3a3a3a; background: #222; }

  .item.done {
    background: var(--done);
    border-color: #3a5020;
    opacity: 0.8;
  }

  .item.done .item-text { text-decoration: line-through; color: var(--muted); }
  .item.done .item-note { color: #3a5a20; }

  .checkbox {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.2s ease;
    background: transparent;
  }

  .item.done .checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }

  .checkmark {
    opacity: 0;
    transform: scale(0);
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    color: #0d0d0d;
    font-size: 12px;
    font-weight: 800;
  }

  .item.done .checkmark { opacity: 1; transform: scale(1); }

  .item-content { flex: 1; }
  .item-text { font-size: 14px; font-weight: 400; line-height: 1.4; }
  .item-note { font-size: 12px; color: var(--muted); margin-top: 3px; font-weight: 300; }

  .reset-btn {
    display: block;
    margin: 32px auto 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  .complete-banner {
    display: none;
    background: linear-gradient(135deg, #1a2e0a, #0d2a1a);
    border: 1px solid #3a6020;
    border-radius: 12px;
    padding: 20px 24px;
    text-align: center;
    margin-top: 32px;
    animation: fadeUp 0.5s ease both;
  }

  .complete-banner.show { display: block; }
  .complete-banner h3 { font-family: 'Syne', sans-serif; color: var(--accent); font-size: 18px; margin-bottom: 6px; }
  .complete-banner p { color: var(--muted); font-size: 14px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="tag">digitalGB</div>
    <h1>DigitalGB Onboarding<br><span>Checklist</span></h1>
    <p class="subtitle">Track every step from signed contract to campaign launch.</p>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-label">
      <span>Progress</span>
      <span id="progressText">0 / 0 completed</span>
    </div>
  </header>

  <div id="phases"></div>

  <button class="reset-btn" onclick="resetAll()">↺ Reset Checklist</button>
  <div class="complete-banner" id="completeBanner">
    <h3>🎉 Onboarding Complete!</h3>
    <p>Your client is fully set up and ready to grow. Time to deliver results.</p>
  </div>
</div>

<script>
const data = [
  {
    phase: "Pre-Onboarding",
    color: "#c8f542",
    items: [
      { text: "Send & collect signed contract / proposal", note: "Confirm scope, deliverables, and payment terms" },
      { text: "Collect first invoice payment", note: "Ensure payment is processed before work begins" },
      { text: "Send welcome email to new client", note: "Introduce account manager and set expectations" },
      { text: "Assign dedicated account manager", note: "Primary point of contact for all communication" },
    ]
  },
  {
    phase: "Discovery & Access",
    color: "#42f5c8",
    items: [
      { text: "Request access to Google Analytics & Search Console", note: "View-only or admin access as needed" },
      { text: "Request access to ad accounts (Google Ads, Meta, etc.)", note: "Add agency as partner or admin" },
      { text: "Request access to social media profiles", note: "Instagram, LinkedIn, Facebook, TikTok, etc." },
      { text: "Collect brand assets", note: "Logos, brand guidelines, fonts, color palette" },
    ]
  },
  {
    phase: "Strategy & Setup",
    color: "#f5a442",
    items: [
      { text: "Build 30/60/90 day strategy roadmap", note: "Share with client for approval" },
      { text: "Set up client reporting dashboard", note: "Google Looker Studio, AgencyAnalytics, or similar" },
      { text: "Schedule recurring monthly strategy call", note: "Lock in calendar time to review results" },
    ]
  },
  {
    phase: "Kickoff",
    color: "#f542a4",
    items: [
      { text: "Host kickoff call with client", note: "Walk through strategy, timeline, and next steps" },
      { text: "Confirm communication channel preferences", note: "Email, Slack, WhatsApp, project management tool" },
      { text: "Set up shared project management workspace", note: "Asana, Trello, ClickUp, or Notion" },
      { text: "Send kickoff recap & summary to client", note: "Document decisions and action items discussed" },
    ]
  },
  {
    phase: "Campaign Launch",
    color: "#c8f542",
    items: [
      { text: "Create and get approval on first deliverables", note: "Ad creatives, content calendar, copy, etc." },
      { text: "Launch campaigns / publish content", note: "Confirm tracking pixels and UTMs are in place" },
      { text: "Send Week 1 check-in update to client", note: "Early results, what's live, what's coming next" },
      { text: "Schedule first monthly performance report", note: "Review results and adjust strategy as needed" },
    ]
  }
];

let state = {};

function init() {
  const saved = localStorage.getItem('onboarding-checklist');
  if (saved) state = JSON.parse(saved);

  const container = document.getElementById('phases');
  container.innerHTML = '';

  data.forEach((phase, pi) => {
    const phaseEl = document.createElement('div');
    phaseEl.className = 'phase';

    const count = phase.items.length;
    const done = phase.items.filter((_, ii) => state[`${pi}-${ii}`]).length;

    phaseEl.innerHTML = `
      <div class="phase-header">
        <div class="phase-num" style="background:${phase.color}">${pi + 1}</div>
        <div class="phase-title">${phase.phase}</div>
        <div class="phase-count">${done}/${count}</div>
      </div>
      <div class="items" id="phase-${pi}"></div>
    `;
    container.appendChild(phaseEl);

    const itemsEl = document.getElementById(`phase-${pi}`);
    phase.items.forEach((item, ii) => {
      const key = `${pi}-${ii}`;
      const isDone = !!state[key];
      const el = document.createElement('div');
      el.className = `item${isDone ? ' done' : ''}`;
      el.innerHTML = `
        <div class="checkbox"><span class="checkmark">✓</span></div>
        <div class="item-content">
          <div class="item-text">${item.text}</div>
          <div class="item-note">${item.note}</div>
        </div>
      `;
      el.addEventListener('click', () => toggle(key, el, pi));
      itemsEl.appendChild(el);
    });
  });

  updateProgress();
}

function toggle(key, el, pi) {
  state[key] = !state[key];
  el.classList.toggle('done', state[key]);
  localStorage.setItem('onboarding-checklist', JSON.stringify(state));
  updateProgress();
  updatePhaseCount(pi);
}

function updatePhaseCount(pi) {
  const phase = data[pi];
  const done = phase.items.filter((_, ii) => state[`${pi}-${ii}`]).length;
  document.querySelector(`#phase-${pi}`).closest('.phase').querySelector('.phase-count').textContent = `${done}/${phase.items.length}`;
}

function updateProgress() {
  const total = data.reduce((s, p) => s + p.items.length, 0);
  const done = Object.values(state).filter(Boolean).length;
  const pct = total ? (done / total) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total} completed`;
  document.getElementById('completeBanner').classList.toggle('show', done === total && total > 0);
}

function resetAll() {
  if (confirm('Reset all checkboxes?')) {
    state = {};
    localStorage.removeItem('onboarding-checklist');
    init();
  }
}

init();
</script>
</body>
</html>
